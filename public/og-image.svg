<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">

  <!-- Fond noir -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Halo vert doux côté plume -->
  <radialGradient id="halo" cx="75%" cy="50%" r="40%">
    <stop offset="0%"   stop-color="#22c55e" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0f0f0f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Ligne d'accent verte gauche -->
  <rect x="80" y="145" width="3" height="340" rx="1.5" fill="#22c55e" opacity="0.5"/>

  <!-- Texte "Anime" -->
  <text x="112" y="308"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-weight="800" font-size="128" letter-spacing="-4"
        fill="white">Anime</text>

  <!-- Texte "Ink" en vert -->
  <text x="112" y="432"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-weight="800" font-size="128" letter-spacing="-4"
        fill="#22c55e">Ink</text>

  <!-- Séparateur vert -->
  <rect x="112" y="452" width="90" height="5" rx="2.5" fill="#22c55e" opacity="0.55"/>

  <!-- Tagline -->
  <text x="112" y="512"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-weight="400" font-size="26" letter-spacing="1"
        fill="#6b7280">Découvre l'univers des animés</text>

  <!-- URL -->
  <text x="112" y="566"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-weight="500" font-size="18" letter-spacing="3"
        fill="#374151">anime-ink.app</text>

  <!-- === GRANDE PLUME côté droit (même logique que favicon, scale 5) === -->
  <g transform="translate(700, 40)">
    <g transform="rotate(38 250 275) scale(5) translate(-50,-50)">

      <!-- Vane gauche -->
      <path d="M 50 7 C 36 10 30 30 30 50 C 30 70 38 84 50 90 C 44 80 42 62 44 50 C 46 32 48 14 50 7 Z"
            fill="#d4d4d4"/>

      <!-- Vane droite -->
      <path d="M 50 7 C 64 10 72 30 72 50 C 72 70 64 84 50 90 C 56 80 58 62 56 50 C 54 32 52 14 50 7 Z"
            fill="white"/>

      <!-- Barbes (visibles à grande taille) -->
      <g stroke="#c0c0c0" stroke-width="0.6" stroke-linecap="round" opacity="0.6">
        <line x1="50" y1="22" x2="62" y2="26"/>
        <line x1="50" y1="33" x2="64" y2="38"/>
        <line x1="50" y1="44" x2="64" y2="50"/>
        <line x1="50" y1="55" x2="63" y2="62"/>
        <line x1="50" y1="66" x2="60" y2="73"/>
        <line x1="50" y1="22" x2="38" y2="26"/>
        <line x1="50" y1="33" x2="36" y2="38"/>
        <line x1="50" y1="44" x2="36" y2="50"/>
        <line x1="50" y1="55" x2="37" y2="62"/>
        <line x1="50" y1="66" x2="40" y2="73"/>
      </g>

      <!-- Rachis -->
      <line x1="50" y1="8" x2="50" y2="90" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

    </g>

    <!-- Bec vert (positionné manuellement au bas-gauche de la plume pivotée) -->
    <path d="M 128 403 L 72 483 L 140 428 Z" fill="#22c55e"/>

    <!-- Goutte d'encre -->
    <circle cx="60" cy="478" r="28" fill="#22c55e"/>

    <!-- Micro-éclaboussures -->
    <circle cx="36" cy="450" r="9"  fill="#22c55e" opacity="0.55"/>
    <circle cx="92" cy="494" r="6"  fill="#22c55e" opacity="0.4"/>
    <circle cx="50" cy="494" r="4"  fill="#22c55e" opacity="0.3"/>
  </g>

  <!-- Bande verte bas -->
  <rect x="0" y="622" width="1200" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>

</svg>
