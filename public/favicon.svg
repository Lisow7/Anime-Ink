<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Fond noir arrondi -->
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>

  <!-- Corps de la plume — forme amande large, pivotée 38° pour aller de haut-droite vers bas-gauche -->
  <g transform="rotate(38 50 50)">

    <!-- Vane gauche (arrière-plan, légèrement plus sombre) -->
    <path d="M 50 7 C 36 10 30 30 30 50 C 30 70 38 84 50 90 C 44 80 42 62 44 50 C 46 32 48 14 50 7 Z"
          fill="#d4d4d4"/>

    <!-- Vane droite (premier plan, blanc éclatant) -->
    <path d="M 50 7 C 64 10 72 30 72 50 C 72 70 64 84 50 90 C 56 80 58 62 56 50 C 54 32 52 14 50 7 Z"
          fill="white"/>

    <!-- Rachis (axe central) -->
    <line x1="50" y1="8" x2="50" y2="90" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round"/>

  </g>

  <!-- Bec vert — grand et visible -->
  <path d="M 26 81 L 9 97 L 28 86 Z" fill="#22c55e"/>

  <!-- Goutte d'encre — grande et ronde -->
  <circle cx="7" cy="96" r="6" fill="#22c55e"/>

</svg>
