<!doctype html>
<html lang="fr" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App manifest & theme -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary Meta Tags -->
    <title>Anime-Ink — Découvre l'univers des animés</title>
    <meta name="title" content="Anime-Ink — Découvre l'univers des animés" />
    <meta name="description" content="Recherche, explore et découvre des milliers d'animés. Catalogue complet, favoris, suivi de progression et filtres avancés." />
    <meta name="keywords" content="anime, animé, catalogue anime, manga, myanimelist, recherche anime, top anime, favoris anime, liste anime, animé français" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Anime-Ink" />
    <meta name="language" content="French" />

    <!-- Canonical -->
    <link rel="canonical" href="https://lisow7.github.io/Anime-Ink/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lisow7.github.io/Anime-Ink/" />
    <meta property="og:site_name" content="Anime-Ink" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Anime-Ink — Découvre l'univers des animés" />
    <meta property="og:description" content="Recherche, explore et découvre des milliers d'animés. Catalogue complet, favoris, suivi de progression et filtres avancés." />
    <meta property="og:image" content="https://lisow7.github.io/Anime-Ink/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Anime-Ink — Catalogue d'animés" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://lisow7.github.io/Anime-Ink/" />
    <meta name="twitter:title" content="Anime-Ink — Découvre l'univers des animés" />
    <meta name="twitter:description" content="Recherche, explore et découvre des milliers d'animés. Catalogue complet, favoris, suivi de progression et filtres avancés." />
    <meta name="twitter:image" content="https://lisow7.github.io/Anime-Ink/og-image.svg" />

    <!-- Preconnect API & CDN -->
    <link rel="preconnect" href="https://api.jikan.moe" />
    <link rel="dns-prefetch" href="https://api.jikan.moe" />
    <link rel="preconnect" href="https://myanimelist.net" crossorigin />
    <link rel="dns-prefetch" href="https://myanimelist.net" />
    <link rel="preconnect" href="https://cdn.myanimelist.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.myanimelist.net" />

    <!-- Structured Data — WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Anime-Ink",
      "url": "https://lisow7.github.io/Anime-Ink/",
      "description": "Recherche, explore et découvre des milliers d'animés.",
      "inLanguage": "fr-FR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://lisow7.github.io/Anime-Ink/catalogue?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- Redirect SPA GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
